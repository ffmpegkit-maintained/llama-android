name: Build (release)

# Manual release build. Produces the optimized (-O3) arm64-v8a AAR, verifies the
# native .so is present and 16 KB aligned, and attaches it to a GitHub Release
# when triggered by a v* tag. Does NOT publish to Maven Central.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # allow the "Attach AAR to GitHub Release" step to create the release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK r27c + CMake + Ninja
        run: |
          sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"
          sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Assemble library (release)
        run: |
          chmod +x ./gradlew
          ./gradlew :library:assembleRelease --stacktrace

      - name: Verify native lib + 16 KB alignment
        run: |
          set -e
          AAR=$(find library/build/outputs/aar -name "*-release.aar" | head -1)
          echo "AAR: $AAR ($(du -h "$AAR" | cut -f1))"
          unzip -o "$AAR" -d /tmp/aar > /dev/null
          SO=/tmp/aar/jni/arm64-v8a/libllama_jni.so
          test -f "$SO" || { echo "::error::libllama_jni.so missing"; exit 1; }
          NDK=$ANDROID_SDK_ROOT/ndk/27.2.12479018
          READELF=$(find "$NDK" -name "llvm-readelf" | head -1)
          echo "Segment alignment:"; "$READELF" -l "$SO" | grep -A1 LOAD | grep -oE "0x[0-9a-f]+$" | sort -u | tail -3
          echo "✓ Native lib present"

      - uses: actions/upload-artifact@v4
        with:
          name: llama-android-release-aar
          path: library/build/outputs/aar/*-release.aar
          retention-days: 5

      - name: Attach AAR to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: library/build/outputs/aar/*-release.aar
